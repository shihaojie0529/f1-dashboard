<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PIT WALL — 车手档案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,500;0,600;0,700;1,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0C11; --panel:#10141C; --panel-2:#171C27; --line:#232A38; --line-soft:#1B212D;
    --text:#EDEFF3; --muted:#78829A; --purple:#B57BFF; --green:#34D77B; --yellow:#FFC53D;
    --red:#E10600; --accent:#4C8DFF; --kerb-w:14px;
  }
  *{box-sizing:border-box;}
  html{scrollbar-color:var(--line) var(--bg);}
  body{
    margin:0;
    background:
      radial-gradient(1100px 520px at 85% -12%, rgba(225,6,0,0.07), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(76,141,255,0.05), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Chakra Petch', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent); text-decoration:none;} a:hover{color:var(--text);}
  .mono{font-family:'JetBrains Mono', monospace;}
  header{padding:26px 32px 18px; display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px;}
  .brand-eyebrow{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.28em; color:var(--red); text-transform:uppercase; margin-bottom:7px;}
  h1{margin:0; font-size:30px; font-weight:700; font-style:italic; letter-spacing:0.05em; text-transform:uppercase; line-height:1;}
  h1 .thin{font-weight:500; color:var(--muted);}
  .kerb{height:5px; background:repeating-linear-gradient(-45deg, var(--red) 0 var(--kerb-w), #E9EAEC var(--kerb-w) calc(var(--kerb-w)*2)); border-bottom:1px solid var(--line);}
  .tabs{display:flex; gap:4px; padding:0 32px; background:var(--panel); border-bottom:1px solid var(--line); overflow-x:auto;}
  .tab{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); text-decoration:none; padding:13px 16px; border-bottom:2px solid transparent; transition:color .15s ease; white-space:nowrap;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text); border-bottom-color:var(--red);}
  .status{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:0.05em; display:flex; align-items:center; gap:8px; padding:8px 12px; border:1px solid var(--line-soft); border-radius:5px; background:rgba(16,20,28,0.6);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}

  main{padding:26px 32px 40px; max-width:1080px; margin:0 auto;}
  .back-link{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.08em; display:inline-block; margin-bottom:18px;}

  .profile-head{
    position:relative; overflow:hidden;
    background:linear-gradient(135deg, var(--panel-2), var(--panel));
    border:1px solid var(--line); border-radius:10px;
    padding:26px 28px; margin-bottom:26px;
  }
  .ghost{
    position:absolute; right:-6px; bottom:-30px;
    font-style:italic; font-weight:700; font-size:130px; line-height:1;
    color:transparent; -webkit-text-stroke:1px var(--line); pointer-events:none; user-select:none;
  }
  .p-eyebrow{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:8px;}
  .p-name{font-size:34px; font-weight:700; font-style:italic; text-transform:uppercase; letter-spacing:0.02em; margin:0 0 6px; line-height:1.1;}
  .p-sub{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted);}

  .kpi-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:26px;}
  .kpi{background:var(--panel); border:1px solid var(--line-soft); border-radius:8px; padding:14px 16px;}
  .kpi .v{font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1;}
  .kpi .l{font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.12em; color:var(--muted); text-transform:uppercase; margin-top:8px; line-height:1.5;}

  .section-label{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em;
    color:var(--muted); text-transform:uppercase; margin:30px 0 14px;
    display:flex; align-items:center; gap:12px;
  }
  .section-label::after{content:''; flex:1; height:1px; background:var(--line);}
  .section-label .cn{color:var(--text);}
  .panel-box{background:var(--panel); border:1px solid var(--line-soft); border-radius:8px; padding:8px 20px; margin-bottom:8px;}

  .res-line{
    display:grid; grid-template-columns:minmax(130px,1fr) 60px 60px 64px; gap:10px;
    align-items:center; padding:7px 0; border-bottom:1px solid var(--line-soft);
    font-family:'JetBrains Mono',monospace; font-size:11px;
  }
  .res-line:last-child{border-bottom:none;}
  .res-line .rn{color:var(--text); font-family:'Chakra Petch',sans-serif; font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .res-line span{text-align:center; font-variant-numeric:tabular-nums; color:var(--muted);}
  .res-line .pos{color:var(--text); font-weight:700;}
  .res-line .pos.win{color:var(--yellow);}
  .res-line .pos.podium{color:var(--green);}
  .res-line .pos.dnf{color:#FF7B76;}
  .rl-head{color:var(--muted); font-size:9px; letter-spacing:0.1em; text-transform:uppercase; border-bottom:1px solid var(--line);}
  .rl-head .rn{font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); font-weight:400;}

  .yr-line{
    display:grid; grid-template-columns:56px 1fr 70px 60px 70px; gap:10px;
    align-items:center; padding:8px 0; border-bottom:1px solid var(--line-soft);
    font-family:'JetBrains Mono',monospace; font-size:12px;
  }
  .yr-line:last-child{border-bottom:none;}
  .yr-line .yr{font-weight:700;}
  .yr-line .tm{font-family:'Chakra Petch',sans-serif; color:var(--muted); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .yr-line span{text-align:right; font-variant-numeric:tabular-nums; color:var(--muted);}
  .yr-line .champ{color:var(--yellow); font-weight:700;}
  .yr-line .rank{color:var(--text); font-weight:700; text-align:right;}

  .empty-state{color:var(--muted); font-size:13px; padding:36px 16px; text-align:center; line-height:1.7;}
  .skeleton{height:70px; border-radius:8px; margin-bottom:12px;
    background:linear-gradient(90deg, var(--panel) 25%, var(--panel-2) 50%, var(--panel) 75%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .error-banner{margin:16px 0; padding:12px 16px; background:rgba(225,6,0,0.07); border:1px solid rgba(225,6,0,0.35); border-radius:6px; color:#FF7B76; font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.6;}
  footer{padding:18px 32px 30px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); border-top:1px solid var(--line); line-height:1.7;}
  footer a{color:var(--accent);}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
  @media (max-width:560px){ header, main, footer{padding-left:16px; padding-right:16px;} .tabs{padding:0 16px;} }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand-eyebrow">Driver Profile</div>
    <h1>档案 <span class="thin">Profile</span></h1>
  </div>
  <div class="status" role="status"><span class="dot" id="statusDot"></span><span id="statusText">加载中…</span></div>
</header>
<div class="kerb" aria-hidden="true"></div>
<nav class="tabs" aria-label="页面导航">
  <a class="tab" href="index.html">计时台 Timing</a>
  <a class="tab" href="analysis.html">分析 Analysis</a>
  <a class="tab" href="compare.html">对比 Compare</a>
  <a class="tab" href="schedule.html">赛程 Schedule</a>
  <a class="tab active" href="standings.html">积分榜 Standings</a>
</nav>

<main>
  <a class="back-link" href="standings.html">← 返回积分榜</a>
  <div id="loadingWrap"><div class="skeleton" style="height:130px;"></div><div class="skeleton"></div></div>
  <div id="errorBanner"></div>
  <div id="content" style="display:none;"></div>
</main>

<footer>
  数据来自 <a href="https://jolpi.ca" target="_blank" rel="noopener">Jolpica-F1 API</a>（Ergast 继任者，社区维护，非 F1 官方）。历史数据覆盖 1950 年至今。
</footer>

<script>
"use strict";
const ERGAST = 'https://api.jolpi.ca/ergast/f1';
const $ = (id) => document.getElementById(id);

function esc(v){ return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function setStatus(t){ $('statusText').textContent = t; }
function showError(m){ $('errorBanner').innerHTML = '<div class="error-banner">' + esc(m) + '</div>'; }
async function getJSON(url){
  const res = await fetch(url);
  if (!res.ok) throw new Error('请求失败 (' + res.status + ')');
  return res.json();
}
const GP_CN = {
  'Bahrain Grand Prix':'巴林','Saudi Arabian Grand Prix':'沙特','Australian Grand Prix':'澳大利亚',
  'Japanese Grand Prix':'日本','Chinese Grand Prix':'中国','Miami Grand Prix':'迈阿密',
  'Emilia Romagna Grand Prix':'艾米利亚','Monaco Grand Prix':'摩纳哥','Canadian Grand Prix':'加拿大',
  'Spanish Grand Prix':'西班牙','Austrian Grand Prix':'奥地利','British Grand Prix':'英国',
  'Hungarian Grand Prix':'匈牙利','Belgian Grand Prix':'比利时','Dutch Grand Prix':'荷兰',
  'Italian Grand Prix':'意大利','Azerbaijan Grand Prix':'阿塞拜疆','Singapore Grand Prix':'新加坡',
  'United States Grand Prix':'美国','Mexico City Grand Prix':'墨西哥城','São Paulo Grand Prix':'圣保罗',
  'Las Vegas Grand Prix':'拉斯维加斯','Qatar Grand Prix':'卡塔尔','Abu Dhabi Grand Prix':'阿布扎比',
  'Madrid Grand Prix':'马德里'
};
function gpShort(name){ return GP_CN[name] || name.replace(' Grand Prix',''); }
function finished(res){
  const s = res.status || '';
  return s === 'Finished' || s.startsWith('+');
}

const params = new URLSearchParams(location.search);
const mode = params.get('type') === 'team' ? 'team' : 'driver';
const id = params.get('id');
let year = +(params.get('year') || new Date().getFullYear());

async function load(){
  if (!id){
    $('loadingWrap').style.display = 'none';
    showError('缺少 id 参数 — 请从积分榜点击车手或车队进入。');
    setStatus('参数错误');
    return;
  }
  try{
    if (mode === 'driver') await loadDriver();
    else await loadTeam();
  } catch(err){
    $('loadingWrap').style.display = 'none';
    showError('加载失败：' + err.message);
    setStatus('连接错误');
  }
}

function kpi(v, l){ return '<div class="kpi"><div class="v">' + v + '</div><div class="l">' + l + '</div></div>'; }

// Jolpica 的 standings 接口必须指定赛季 — 先取车手参赛赛季列表，再逐年取（限流）
async function getCareerStandings(kind, id){
  const seasonsRes = await getJSON(ERGAST + '/' + kind + 's/' + id + '/seasons.json?limit=100');
  const seasons = (seasonsRes.MRData.SeasonTable.Seasons || []).map(s => s.season);
  const key = kind === 'driver' ? 'driverstandings' : 'constructorstandings';
  const out = [];
  // 并发 3，批次间 350ms，避免触发 Jolpica 限流
  for (let i = 0; i < seasons.length; i += 3){
    const batch = seasons.slice(i, i + 3);
    const results = await Promise.all(batch.map(async (yr) => {
      try{
        const j = await getJSON(ERGAST + '/' + yr + '/' + kind + 's/' + id + '/' + key + '.json');
        const sl = j.MRData.StandingsTable.StandingsLists || [];
        return sl.length ? sl[0] : null;
      } catch(e){ return null; }
    }));
    for (const r of results) if (r) out.push(r);
    if (i + 3 < seasons.length) await new Promise(res => setTimeout(res, 350));
    setStatus('加载历年战绩… ' + Math.min(i + 3, seasons.length) + '/' + seasons.length);
  }
  out.sort((a,b) => +a.season - +b.season);
  return out;
}

/* ── 车手档案 ── */
async function loadDriver(){
  setStatus('加载 ' + id + ' 数据…');
  let seasonRes = await getJSON(ERGAST + '/' + year + '/drivers/' + id + '/results.json?limit=100');
  let races = seasonRes.MRData.RaceTable.Races || [];
  if (!races.length && year === new Date().getFullYear()){
    year -= 1;
    seasonRes = await getJSON(ERGAST + '/' + year + '/drivers/' + id + '/results.json?limit=100');
    races = seasonRes.MRData.RaceTable.Races || [];
  }
  const careerLists = await getCareerStandings('driver', id);

  const last = races.length ? races[races.length - 1].Results[0] : null;
  const drv = last ? last.Driver
    : (careerLists.length ? null : null);
  const name = drv ? drv.givenName + ' ' + drv.familyName : id;
  const team = last ? last.Constructor.name : '';
  const num = drv && drv.permanentNumber ? drv.permanentNumber : '';

  document.title = 'PIT WALL — ' + name;

  // 赛季汇总
  let pts = 0, wins = 0, podiums = 0, poles = 0, dnf = 0, finSum = 0, finN = 0, gridSum = 0, gridN = 0;
  for (const race of races){
    const r = race.Results[0];
    pts += +r.points || 0;
    if (r.position === '1') wins++;
    if (+r.position <= 3 && finished(r)) podiums++;
    if (r.grid === '1') poles++;
    if (!finished(r)) dnf++;
    else { finSum += +r.position; finN++; }
    if (+r.grid > 0){ gridSum += +r.grid; gridN++; }
  }

  // 生涯汇总
  let cPts = 0, cWins = 0, titles = 0;
  for (const sl of careerLists){
    const s = sl.DriverStandings && sl.DriverStandings[0];
    if (!s) continue;
    cPts += +s.points || 0;
    cWins += +s.wins || 0;
    if (s.position === '1') titles++;
  }

  let html = '';
  html += '<div class="profile-head">' +
    (num ? '<span class="ghost">' + esc(num) + '</span>' : '') +
    '<div class="p-eyebrow" style="color:var(--red)">' + (num ? '#' + esc(num) + ' · ' : '') + esc(team) + '</div>' +
    '<h2 class="p-name">' + esc(name) + '</h2>' +
    '<div class="p-sub">' + (drv && drv.nationality ? esc(drv.nationality) + ' · ' : '') + (drv && drv.dateOfBirth ? esc(drv.dateOfBirth) : '') + '</div>' +
  '</div>';

  // 正赛结果不含冲刺赛积分 —— 有官方积分榜数据时以它为准
  const official = careerLists.find(sl => +sl.season === year);
  if (official && official.DriverStandings && official.DriverStandings[0]) pts = +official.DriverStandings[0].points;

  html += '<div class="section-label"><span class="cn">' + year + ' 赛季</span>This Season</div>';
  html += '<div class="kpi-grid">' +
    kpi(pts, '积分 Points') + kpi(wins, '分站冠军 Wins') + kpi(podiums, '领奖台 Podiums') +
    kpi(poles, '杆位 Poles') +
    kpi(finN ? (finSum/finN).toFixed(1) : '—', '平均完赛名次') +
    kpi(gridN ? (gridSum/gridN).toFixed(1) : '—', '平均发车位') +
    kpi(dnf, '退赛 DNF') + '</div>';

  if (races.length){
    html += '<div class="section-label"><span class="cn">每站结果</span>Race Results</div><div class="panel-box">';
    html += '<div class="res-line rl-head"><span class="rn">分站</span><span>发车</span><span>完赛</span><span>积分</span></div>';
    html += races.map(race => {
      const r = race.Results[0];
      const fin = finished(r);
      let cls = 'pos';
      if (!fin) cls += ' dnf';
      else if (r.position === '1') cls += ' win';
      else if (+r.position <= 3) cls += ' podium';
      return '<div class="res-line">' +
        '<span class="rn">R' + esc(race.round) + ' ' + esc(gpShort(race.raceName)) + '</span>' +
        '<span>' + (+r.grid > 0 ? 'P' + esc(r.grid) : 'PIT') + '</span>' +
        '<span class="' + cls + '"' + (!fin ? ' title="' + esc(r.status) + '"' : '') + '>' + (fin ? 'P' + esc(r.position) : 'DNF') + '</span>' +
        '<span>' + esc(r.points) + '</span>' +
      '</div>';
    }).join('');
    html += '</div>';
  }

  if (careerLists.length){
    html += '<div class="section-label"><span class="cn">历年战绩</span>Career · ' + kpiInline(titles, cWins, Math.round(cPts)) + '</div><div class="panel-box">';
    html += careerLists.slice().reverse().map(sl => {
      const s = sl.DriverStandings[0];
      const isChamp = s.position === '1';
      return '<div class="yr-line">' +
        '<span class="yr" style="text-align:left">' + esc(sl.season) + '</span>' +
        '<span class="tm" style="text-align:left">' + esc(s.Constructors.length ? s.Constructors[s.Constructors.length-1].name : '') + '</span>' +
        '<span>' + esc(s.points) + ' 分</span>' +
        '<span>' + esc(s.wins) + ' 胜</span>' +
        '<span class="rank' + (isChamp ? ' champ' : '') + '">' + (isChamp ? '🏆 冠军' : 'P' + esc(s.position)) + '</span>' +
      '</div>';
    }).join('');
    html += '</div>';
  }

  finish(html, name + ' · ' + year + ' 赛季 ' + races.length + ' 站');
}
function kpiInline(titles, wins, pts){
  return '<span style="letter-spacing:0.04em">' + titles + ' 次世界冠军 · ' + wins + ' 胜 · ' + pts + ' 分</span>';
}

/* ── 车队档案 ── */
async function loadTeam(){
  setStatus('加载 ' + id + ' 数据…');
  let seasonRes = await getJSON(ERGAST + '/' + year + '/constructors/' + id + '/results.json?limit=100');
  let races = seasonRes.MRData.RaceTable.Races || [];
  if (!races.length && year === new Date().getFullYear()){
    year -= 1;
    seasonRes = await getJSON(ERGAST + '/' + year + '/constructors/' + id + '/results.json?limit=100');
    races = seasonRes.MRData.RaceTable.Races || [];
  }
  const histLists = await getCareerStandings('constructor', id);

  const teamName = races.length ? races[0].Results[0].Constructor.name : id;
  document.title = 'PIT WALL — ' + teamName;

  // 两位车手贡献
  const perDriver = new Map();
  let pts = 0, wins = 0, podiums = 0, dnf = 0;
  for (const race of races){
    for (const r of race.Results){
      pts += +r.points || 0;
      if (r.position === '1') wins++;
      if (+r.position <= 3 && finished(r)) podiums++;
      if (!finished(r)) dnf++;
      const dn = r.Driver.code || r.Driver.familyName;
      perDriver.set(dn, (perDriver.get(dn) || 0) + (+r.points || 0));
    }
  }

  let titles = 0;
  for (const sl of histLists){
    const s = sl.ConstructorStandings && sl.ConstructorStandings[0];
    if (s && s.position === '1') titles++;
  }
  const officialT = histLists.find(sl => +sl.season === year);
  if (officialT && officialT.ConstructorStandings && officialT.ConstructorStandings[0]) pts = +officialT.ConstructorStandings[0].points;

  let html = '';
  html += '<div class="profile-head">' +
    '<div class="p-eyebrow" style="color:var(--red)">Constructor · ' + year + '</div>' +
    '<h2 class="p-name">' + esc(teamName) + '</h2>' +
    '<div class="p-sub">' + titles + ' 次车队总冠军（历史）</div>' +
  '</div>';

  html += '<div class="section-label"><span class="cn">' + year + ' 赛季</span>This Season</div>';
  html += '<div class="kpi-grid">' +
    kpi(pts, '车队积分') + kpi(wins, '分站冠军') + kpi(podiums, '领奖台') + kpi(dnf, '退赛 DNF') + '</div>';

  // 车手贡献比例
  const contrib = [...perDriver.entries()].sort((a,b) => b[1] - a[1]);
  if (contrib.length && pts > 0){
    html += '<div class="section-label"><span class="cn">车手积分贡献</span>Points Split</div><div class="panel-box" style="padding:16px 20px;">';
    for (const [dn, p] of contrib){
      const pct = (p / pts * 100);
      html += '<div style="margin-bottom:12px;">' +
        '<div style="display:flex; justify-content:space-between; font-family:JetBrains Mono,monospace; font-size:11px; margin-bottom:5px;"><strong>' + esc(dn) + '</strong><span>' + p + ' 分 · ' + pct.toFixed(0) + '%</span></div>' +
        '<div style="height:7px; background:var(--bg); border-radius:4px; overflow:hidden; border:1px solid var(--line-soft);"><div style="height:100%; width:' + pct.toFixed(1) + '%; background:var(--accent); border-radius:4px;"></div></div>' +
      '</div>';
    }
    html += '</div>';
  }

  if (histLists.length){
    html += '<div class="section-label"><span class="cn">历年排名</span>History</div><div class="panel-box">';
    html += histLists.slice().reverse().map(sl => {
      const s = sl.ConstructorStandings[0];
      const isChamp = s.position === '1';
      return '<div class="yr-line" style="grid-template-columns:56px 1fr 70px 60px 70px;">' +
        '<span class="yr" style="text-align:left">' + esc(sl.season) + '</span>' +
        '<span></span>' +
        '<span>' + esc(s.points) + ' 分</span>' +
        '<span>' + esc(s.wins) + ' 胜</span>' +
        '<span class="rank' + (isChamp ? ' champ' : '') + '">' + (isChamp ? '🏆 冠军' : 'P' + esc(s.position)) + '</span>' +
      '</div>';
    }).join('');
    html += '</div>';
  }

  finish(html, teamName + ' · ' + year + ' 赛季');
}

function finish(html, statusText){
  $('content').innerHTML = html;
  $('loadingWrap').style.display = 'none';
  $('content').style.display = 'block';
  setStatus(statusText);
}

load();
</script>

</body>
</html>
