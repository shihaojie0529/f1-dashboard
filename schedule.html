<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PIT WALL — 赛程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,500;0,600;0,700;1,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0C11; --panel:#10141C; --panel-2:#171C27; --line:#232A38; --line-soft:#1B212D;
    --text:#EDEFF3; --muted:#78829A; --purple:#B57BFF; --green:#34D77B; --yellow:#FFC53D;
    --red:#E10600; --accent:#4C8DFF; --kerb-w:14px;
  }
  *{box-sizing:border-box;}
  html{scrollbar-color:var(--line) var(--bg);}
  body{
    margin:0;
    background:
      radial-gradient(1100px 520px at 85% -12%, rgba(225,6,0,0.07), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(76,141,255,0.05), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Chakra Petch', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent);} a:hover{color:var(--text);}
  .mono{font-family:'JetBrains Mono', monospace;}
  header{padding:26px 32px 18px; display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px;}
  .brand-eyebrow{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.28em; color:var(--red); text-transform:uppercase; margin-bottom:7px;}
  h1{margin:0; font-size:30px; font-weight:700; font-style:italic; letter-spacing:0.05em; text-transform:uppercase; line-height:1;}
  h1 .thin{font-weight:500; color:var(--muted);}
  .kerb{height:5px; background:repeating-linear-gradient(-45deg, var(--red) 0 var(--kerb-w), #E9EAEC var(--kerb-w) calc(var(--kerb-w)*2)); border-bottom:1px solid var(--line);}
  .tabs{display:flex; gap:4px; padding:0 32px; background:var(--panel); border-bottom:1px solid var(--line);}
  .tab{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); text-decoration:none; padding:13px 16px; border-bottom:2px solid transparent; transition:color .15s ease;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--text); border-bottom-color:var(--red);}
  .status{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:0.05em; display:flex; align-items:center; gap:8px; padding:8px 12px; border:1px solid var(--line-soft); border-radius:5px; background:rgba(16,20,28,0.6);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;}
  .dot.live{background:var(--green); box-shadow:0 0 8px var(--green); animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}

  main{padding:26px 32px 40px; max-width:1200px; margin:0 auto;}

  /* ── Next race hero ── */
  .hero{
    display:grid; grid-template-columns: 1.2fr 1fr; gap:0;
    border:1px solid var(--line); border-radius:10px; overflow:hidden;
    background:linear-gradient(135deg, var(--panel-2), var(--panel));
    margin-bottom:30px;
  }
  @media (max-width:820px){ .hero{grid-template-columns:1fr;} }
  .hero-left{padding:26px 28px; position:relative; overflow:hidden;}
  .hero-round{
    position:absolute; right:-8px; bottom:-22px;
    font-style:italic; font-weight:700; font-size:120px; line-height:1;
    color:transparent; -webkit-text-stroke:1px var(--line); pointer-events:none; user-select:none;
  }
  .eyebrow{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.2em; color:var(--red); text-transform:uppercase; margin-bottom:10px;}
  .hero-title{font-size:32px; font-weight:700; font-style:italic; text-transform:uppercase; letter-spacing:0.02em; margin:0 0 6px; line-height:1.1;}
  .hero-sub{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); margin-bottom:22px;}
  .countdown{display:flex; gap:10px; flex-wrap:wrap;}
  .cd-box{
    background:var(--bg); border:1px solid var(--line); border-radius:7px;
    padding:12px 0; width:76px; text-align:center;
  }
  .cd-num{font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1;}
  .cd-label{font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:0.15em; color:var(--muted); margin-top:7px; text-transform:uppercase;}
  .hero-right{border-left:1px solid var(--line); padding:22px 24px; background:rgba(10,12,17,0.4);}
  @media (max-width:820px){ .hero-right{border-left:none; border-top:1px solid var(--line);} }
  .sess-head{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; margin-bottom:12px;}
  .sess-row{
    display:flex; justify-content:space-between; align-items:baseline;
    font-family:'JetBrains Mono',monospace; font-size:12px;
    padding:8px 0; border-bottom:1px solid var(--line-soft);
  }
  .sess-row:last-child{border-bottom:none;}
  .sess-row .name{color:var(--text); letter-spacing:0.05em;}
  .sess-row .time{color:var(--muted); font-variant-numeric:tabular-nums;}
  .sess-row .times{display:flex; flex-direction:column; align-items:flex-end; gap:2px;}
  .sess-row .time.bjt{color:var(--accent);}
  .sess-row.race .name{color:var(--red); font-weight:700;}
  .sess-row.race .time.bjt{color:var(--text); font-weight:700;}
  .tz-note{font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); margin-top:12px; letter-spacing:0.04em;}

  /* ── Calendar list ── */
  .section-label{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em;
    color:var(--muted); text-transform:uppercase; margin:0 0 14px;
    display:flex; align-items:center; gap:12px;
  }
  .section-label::after{content:''; flex:1; height:1px; background:var(--line);}
  .cal-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(330px, 1fr)); gap:12px;}
  .race-card{
    display:grid; grid-template-columns:54px 1fr auto; gap:14px; align-items:center;
    background:var(--panel); border:1px solid var(--line-soft); border-radius:8px;
    padding:14px 16px; border-left:3px solid transparent;
    transition:border-color .15s ease, background .15s ease;
  }
  .race-card:hover{background:var(--panel-2); border-color:var(--line);}
  .race-card.next{border-left-color:var(--red); background:var(--panel-2);}
  .race-card.live-card{border-left-color:var(--green);}
  .race-card.past{opacity:0.78;}
  .rc-round{
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted);
    text-align:center; line-height:1.3;
  }
  .rc-round strong{display:block; font-size:18px; color:var(--text); font-weight:700;}
  .race-card.past .rc-round strong{color:var(--muted);}
  .rc-name{font-size:15px; font-weight:600; letter-spacing:0.02em; margin-bottom:3px;}
  .rc-meta{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.03em;}
  .rc-right{text-align:right;}
  .rc-date{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text); font-variant-numeric:tabular-nums; margin-bottom:4px;}
  .badge{
    display:inline-block; font-family:'JetBrains Mono',monospace; font-size:9px;
    letter-spacing:0.1em; text-transform:uppercase; padding:3px 7px; border-radius:3px;
  }
  .badge.done{background:var(--panel-2); color:var(--muted); border:1px solid var(--line);}
  .badge.next-b{background:rgba(225,6,0,0.15); color:#FF7B76; border:1px solid rgba(225,6,0,0.4);}
  .badge.live-b{background:rgba(52,215,123,0.12); color:var(--green); border:1px solid rgba(52,215,123,0.35);}
  .badge.upcoming{background:transparent; color:var(--muted); border:1px solid var(--line-soft);}
  .badge.sprint{background:rgba(255,197,61,0.12); color:var(--yellow); border:1px solid rgba(255,197,61,0.3); margin-left:5px;}
  .rc-winner{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--purple); margin-top:4px;}

  .skeleton{height:70px; border-radius:8px; margin-bottom:12px;
    background:linear-gradient(90deg, var(--panel) 25%, var(--panel-2) 50%, var(--panel) 75%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .error-banner{margin:16px 0; padding:12px 16px; background:rgba(225,6,0,0.07); border:1px solid rgba(225,6,0,0.35); border-radius:6px; color:#FF7B76; font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.6;}
  footer{padding:18px 32px 30px; font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); border-top:1px solid var(--line); line-height:1.7;}
  footer a{color:var(--accent); text-decoration:none;} footer a:hover{text-decoration:underline;}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }
  @media (max-width:560px){ header, main, footer{padding-left:16px; padding-right:16px;} .tabs{padding:0 16px;} }
</style>
</head>
<body>

<header>
  <div>
    <div class="brand-eyebrow">Formula 1 · Season Calendar</div>
    <h1>赛程 <span class="thin">Schedule</span></h1>
  </div>
  <div class="status" role="status"><span class="dot" id="statusDot"></span><span id="statusText">加载中…</span></div>
</header>
<div class="kerb" aria-hidden="true"></div>
<nav class="tabs" aria-label="页面导航">
  <a class="tab" href="index.html">计时台 Timing</a>
  <a class="tab" href="analysis.html">分析 Analysis</a>
  <a class="tab" href="compare.html">对比 Compare</a>
  <a class="tab active" href="schedule.html" aria-current="page">赛程 Schedule</a>
  <a class="tab" href="standings.html">积分榜 Standings</a>
</nav>

<main>
  <div id="heroWrap"><div class="skeleton" style="height:200px;"></div></div>
  <div class="section-label" id="calLabel">全年赛历</div>
  <div id="calWrap"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
  <div id="errorBanner"></div>
</main>

<footer>
  赛历与结果数据来自 <a href="https://jolpi.ca" target="_blank" rel="noopener">Jolpica-F1 API</a>（Ergast 继任者，社区维护，非 F1 官方）。所有时间已换算为你的本地时区。
</footer>

<script>
"use strict";
const ERGAST = 'https://api.jolpi.ca/ergast/f1';
const $ = (id) => document.getElementById(id);

function esc(v){
  return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function setStatus(text, live){
  $('statusText').textContent = text;
  $('statusDot').classList.toggle('live', !!live);
}
async function getJSON(url){
  const res = await fetch(url);
  if (!res.ok) throw new Error('请求失败 (' + res.status + ')');
  return res.json();
}

function raceDate(r){ return new Date(r.date + 'T' + (r.time || '12:00:00Z')); }
function weekendStart(r){
  const first = r.FirstPractice || r.SprintQualifying || r.Qualifying;
  if (first && first.date) return new Date(first.date + 'T' + (first.time || '00:00:00Z'));
  const d = raceDate(r); d.setDate(d.getDate() - 2); return d;
}
function fmtDT(dateStr, timeStr){
  const d = new Date(dateStr + 'T' + (timeStr || '12:00:00Z'));
  return d.toLocaleString('zh-CN', {month:'numeric', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit', hour12:false});
}
function fmtBJT(dateStr, timeStr){
  const d = new Date(dateStr + 'T' + (timeStr || '12:00:00Z'));
  return d.toLocaleString('zh-CN', {timeZone:'Asia/Shanghai', month:'numeric', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit', hour12:false});
}
// 本地时区就是北京时间时，不用重复显示两列
const LOCAL_IS_BJT = new Date().toLocaleString('en-US', {timeZone:'Asia/Shanghai', hour12:false}) === new Date().toLocaleString('en-US', {hour12:false});
function fmtRange(r){
  const s = weekendStart(r), e = raceDate(r);
  const f = (d) => d.toLocaleString('zh-CN', {month:'numeric', day:'numeric'});
  return f(s) + ' – ' + f(e);
}

const GP_CN = {
  'Bahrain Grand Prix':'巴林大奖赛', 'Saudi Arabian Grand Prix':'沙特阿拉伯大奖赛',
  'Australian Grand Prix':'澳大利亚大奖赛', 'Japanese Grand Prix':'日本大奖赛',
  'Chinese Grand Prix':'中国大奖赛', 'Miami Grand Prix':'迈阿密大奖赛',
  'Emilia Romagna Grand Prix':'艾米利亚-罗马涅大奖赛', 'Monaco Grand Prix':'摩纳哥大奖赛',
  'Canadian Grand Prix':'加拿大大奖赛', 'Spanish Grand Prix':'西班牙大奖赛',
  'Austrian Grand Prix':'奥地利大奖赛', 'British Grand Prix':'英国大奖赛',
  'Hungarian Grand Prix':'匈牙利大奖赛', 'Belgian Grand Prix':'比利时大奖赛',
  'Dutch Grand Prix':'荷兰大奖赛', 'Italian Grand Prix':'意大利大奖赛',
  'Azerbaijan Grand Prix':'阿塞拜疆大奖赛', 'Singapore Grand Prix':'新加坡大奖赛',
  'United States Grand Prix':'美国大奖赛', 'Mexico City Grand Prix':'墨西哥城大奖赛',
  'Mexican Grand Prix':'墨西哥大奖赛', 'São Paulo Grand Prix':'圣保罗大奖赛',
  'Brazilian Grand Prix':'巴西大奖赛', 'Las Vegas Grand Prix':'拉斯维加斯大奖赛',
  'Qatar Grand Prix':'卡塔尔大奖赛', 'Abu Dhabi Grand Prix':'阿布扎比大奖赛',
  'Madrid Grand Prix':'马德里大奖赛', 'French Grand Prix':'法国大奖赛',
  'Portuguese Grand Prix':'葡萄牙大奖赛', 'Turkish Grand Prix':'土耳其大奖赛',
  'Russian Grand Prix':'俄罗斯大奖赛', 'Styrian Grand Prix':'施泰尔马克大奖赛',
  'Eifel Grand Prix':'埃菲尔大奖赛', 'Sakhir Grand Prix':'萨希尔大奖赛'
};
const COUNTRY_CN = {
  'Bahrain':'巴林', 'Saudi Arabia':'沙特阿拉伯', 'Australia':'澳大利亚', 'Japan':'日本',
  'China':'中国', 'USA':'美国', 'United States':'美国', 'Italy':'意大利', 'Monaco':'摩纳哥',
  'Canada':'加拿大', 'Spain':'西班牙', 'Austria':'奥地利', 'UK':'英国', 'United Kingdom':'英国',
  'Hungary':'匈牙利', 'Belgium':'比利时', 'Netherlands':'荷兰', 'Azerbaijan':'阿塞拜疆',
  'Singapore':'新加坡', 'Mexico':'墨西哥', 'Brazil':'巴西', 'Qatar':'卡塔尔', 'UAE':'阿联酋',
  'United Arab Emirates':'阿联酋', 'France':'法国', 'Portugal':'葡萄牙', 'Turkey':'土耳其', 'Russia':'俄罗斯'
};
function gpCN(name){ return GP_CN[name] || ''; }
function countryCN(c){ return COUNTRY_CN[c] || c; }

function sessionList(r){
  const out = [];
  const push = (label, obj, isRace) => { if (obj && obj.date) out.push({label, date:obj.date, time:obj.time, isRace:!!isRace}); };
  push('练习赛 1  FP1', r.FirstPractice);
  push('冲刺排位  SQ', r.SprintQualifying);
  push('练习赛 2  FP2', r.SecondPractice);
  push('冲刺赛  Sprint', r.Sprint);
  push('练习赛 3  FP3', r.ThirdPractice);
  push('排位赛  Quali', r.Qualifying);
  out.push({label:'正赛  Race', date:r.date, time:r.time, isRace:true});
  out.sort((a,b) => new Date(a.date + 'T' + (a.time || '00:00:00Z')) - new Date(b.date + 'T' + (b.time || '00:00:00Z')));
  return out;
}

let cdTimer = null;
function startCountdown(target){
  const tick = () => {
    let ms = target - Date.now();
    if (ms < 0) ms = 0;
    const d = Math.floor(ms / 86400000);
    const h = Math.floor(ms / 3600000) % 24;
    const m = Math.floor(ms / 60000) % 60;
    const s = Math.floor(ms / 1000) % 60;
    const set = (id, v) => { const el = $(id); if (el) el.textContent = String(v).padStart(2, '0'); };
    set('cdD', d); set('cdH', h); set('cdM', m); set('cdS', s);
  };
  tick();
  if (cdTimer) clearInterval(cdTimer);
  cdTimer = setInterval(tick, 1000);
}

function renderHero(r, isLiveWeekend){
  const sessions = sessionList(r);
  const sessHtml = sessions.map(s => {
    const bjt = '<span class="time bjt">' + esc(fmtBJT(s.date, s.time)) + '</span>';
    const local = LOCAL_IS_BJT ? '' : '<span class="time">' + esc(fmtDT(s.date, s.time)) + '</span>';
    return '<div class="sess-row' + (s.isRace ? ' race' : '') + '"><span class="name">' + esc(s.label) + '</span><span class="times">' + bjt + local + '</span></div>';
  }).join('');
  $('heroWrap').innerHTML =
    '<section class="hero" aria-label="下一场比赛">' +
      '<div class="hero-left">' +
        '<span class="hero-round" aria-hidden="true">R' + esc(String(r.round).padStart(2,'0')) + '</span>' +
        '<div class="eyebrow">' + (isLiveWeekend ? '比赛周末 · 进行中' : 'Next Race · 下一场') + '</div>' +
        '<h2 class="hero-title">' + esc(gpCN(r.raceName) || r.raceName) + '</h2>' +
        '<div class="hero-sub">' + esc(r.raceName) + ' · ' + esc(r.Circuit.circuitName) + ' · ' + esc(countryCN(r.Circuit.Location.country)) + (r.Sprint ? ' · 冲刺周末' : '') + '</div>' +
        '<div class="countdown" aria-label="正赛倒计时">' +
          '<div class="cd-box"><div class="cd-num" id="cdD">--</div><div class="cd-label">天 Days</div></div>' +
          '<div class="cd-box"><div class="cd-num" id="cdH">--</div><div class="cd-label">时 Hrs</div></div>' +
          '<div class="cd-box"><div class="cd-num" id="cdM">--</div><div class="cd-label">分 Min</div></div>' +
          '<div class="cd-box"><div class="cd-num" id="cdS">--</div><div class="cd-label">秒 Sec</div></div>' +
        '</div>' +
      '</div>' +
      '<div class="hero-right">' +
        '<div class="sess-head">周末赛程 · <span style="color:var(--accent)">北京时间</span>' + (LOCAL_IS_BJT ? '' : ' / 本地时间') + '</div>' + sessHtml +
        '<div class="tz-note">' + (LOCAL_IS_BJT ? '你的本地时区即北京时间 (UTC+8)' : '蓝色为北京时间 (UTC+8) · 灰色为本地时区 ' + esc(Intl.DateTimeFormat().resolvedOptions().timeZone)) + '</div>' +
      '</div>' +
    '</section>';
  startCountdown(raceDate(r).getTime());
}

function renderCalendar(races, winners, year){
  const now = Date.now();
  $('calLabel').textContent = year + ' 全年赛历 · ' + races.length + ' 站';
  $('calWrap').innerHTML = '<div class="cal-grid">' + races.map(r => {
    const start = weekendStart(r).getTime();
    const end = raceDate(r).getTime() + 4 * 3600000;
    const isPast = end < now;
    const isLive = start <= now && now <= end;
    const win = winners.get(r.round);
    let badge, cls = 'race-card';
    if (isLive){ badge = '<span class="badge live-b">进行中</span>'; cls += ' live-card'; }
    else if (isPast){ badge = '<span class="badge done">已结束</span>'; cls += ' past'; }
    else if (r._isNext){ badge = '<span class="badge next-b">下一场</span>'; cls += ' next'; }
    else badge = '<span class="badge upcoming">未开始</span>';
    if (r.Sprint) badge += '<span class="badge sprint">Sprint</span>';
    return (
      '<div class="' + cls + '">' +
        '<div class="rc-round">ROUND<strong>' + esc(String(r.round).padStart(2,'0')) + '</strong></div>' +
        '<div style="min-width:0">' +
          '<div class="rc-name">' + esc(gpCN(r.raceName) || r.raceName) + '</div>' +
          '<div class="rc-meta">' + esc(r.raceName) + ' · ' + esc(countryCN(r.Circuit.Location.country)) + '</div>' +
          (win ? '<div class="rc-winner">冠军 ' + esc(win) + '</div>' : '') +
        '</div>' +
        '<div class="rc-right"><div class="rc-date">' + esc(fmtRange(r)) + '</div>' + badge + '</div>' +
      '</div>'
    );
  }).join('') + '</div>';
}

async function load(){
  try{
    let year = new Date().getFullYear();
    let data = await getJSON(ERGAST + '/' + year + '.json?limit=100');
    let races = data.MRData.RaceTable.Races || [];
    if (!races.length){
      year -= 1;
      data = await getJSON(ERGAST + '/' + year + '.json?limit=100');
      races = data.MRData.RaceTable.Races || [];
      setStatus('暂无 ' + (year + 1) + ' 赛历 — 显示 ' + year);
    }
    if (!races.length){ $('heroWrap').innerHTML = ''; $('errorBanner').innerHTML = '<div class="error-banner">未能获取赛历数据。</div>'; setStatus('无数据'); return; }

    const now = Date.now();
    let next = null, liveWeekend = false;
    for (const r of races){
      const end = raceDate(r).getTime() + 4 * 3600000;
      if (end >= now){ next = r; liveWeekend = weekendStart(r).getTime() <= now; break; }
    }
    if (next) next._isNext = true;

    // Winners of completed races (P1 of every round in one request).
    const winners = new Map();
    try{
      const wd = await getJSON(ERGAST + '/' + year + '/results/1.json?limit=100');
      for (const race of (wd.MRData.RaceTable.Races || [])){
        const res = race.Results && race.Results[0];
        if (res) winners.set(race.round, res.Driver.code || res.Driver.familyName);
      }
    } catch(e){ /* winners are optional */ }

    if (next) renderHero(next, liveWeekend);
    else {
      $('heroWrap').innerHTML = '<section class="hero"><div class="hero-left"><div class="eyebrow">Season Complete</div><h2 class="hero-title">' + year + ' 赛季已收官</h2><div class="hero-sub">全部 ' + races.length + ' 站比赛已结束 — 前往积分榜查看最终排名。</div></div></section>';
      if (cdTimer) clearInterval(cdTimer);
    }
    renderCalendar(races, winners, year);
    const done = races.filter(r => raceDate(r).getTime() + 4*3600000 < now).length;
    setStatus(year + ' 赛季 · ' + done + '/' + races.length + ' 站已完赛', liveWeekend);
  } catch(err){
    $('errorBanner').innerHTML = '<div class="error-banner">加载赛程失败：' + esc(err.message) + '</div>';
    setStatus('连接错误');
  }
}
load();
</script>

</body>
</html>
